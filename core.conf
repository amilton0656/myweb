<VirtualHost *:80>
    ServerName amilton.com.br
    ServerAdmin webmaster@localhost

    DocumentRoot /var/www/myweb

    Alias /static /var/www/myweb/static
    <Directory /var/www/myweb/static>
        Require all granted
    </Directory>

    <Directory /var/www/myweb/core>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    WSGIDaemonProcess core python-home=/var/www/myweb/venv python-path=/var/www/myweb
    WSGIProcessGroup core
    WSGIScriptAlias / /var/www/myweb/core/wsgi.py

    ErrorLog ${APACHE_LOG_DIR}/core_error.log
    CustomLog ${APACHE_LOG_DIR}/core_access.log combined
</VirtualHost>
